<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация - WTF Mail</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Регистрация</h1>
      
      <div class="form-group">
        <label for="name">Имя</label>
        <input type="text" id="name" placeholder="Введите имя" required>
      </div>

      <div class="form-group">
        <label for="surname">Фамилия</label>
        <input type="text" id="surname" placeholder="Введите фамилию" required>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Введите email" required>
      </div>

      <button class="btn" onclick="register()">Получить код</button>
      <div id="message" class="message"></div>
    </div>
  </div>

  <script>
    async function register() {
      const name = document.getElementById('name').value;
      const surname = document.getElementById('surname').value;
      const email = document.getElementById('email').value;
      const messageDiv = document.getElementById('message');

      if (!name || !surname || !email) {
        messageDiv.className = 'message error';
        messageDiv.textContent = 'Заполните все поля';
        return;
      }

      messageDiv.className = 'message';
      messageDiv.textContent = 'Отправка...';

      try {
        const response = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, surname, email })
        });

        const data = await response.json();

        if (response.ok) {
          window.location.href = `/verify.html?email=${encodeURIComponent(email)}`;
        } else {
          messageDiv.className = 'message error';
          messageDiv.textContent = data.error || 'Ошибка регистрации';
        }
      } catch (error) {
        messageDiv.className = 'message error';
        messageDiv.textContent = 'Ошибка сервера';
      }
    }
  </script>
</body>
</html>
